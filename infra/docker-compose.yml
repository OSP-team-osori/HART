services:
  # ====================================================
  # [1] 인프라 & 데이터 저장소
  # ====================================================
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: agent_harness
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d agent_harness"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-remote-write-receiver'
    networks:
      - app-network

  loki:
    image: grafana/loki:latest
    container_name: loki
    volumes:
      - ./config/local-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app-network

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - app-network

  # ====================================================
  # [2] 통합 수집기 (Grafana Alloy)
  # ====================================================
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    user: root
    ports:
      - "4317:4317" # Spring Boot OTLP (gRPC)
      - "4318:4318" # Spring Boot OTLP (HTTP)
    volumes:
      - /proc:/host/proc:ro
      - ./config/config.alloy:/etc/alloy/config.alloy
      - /var/run:/var/run:rw
      - /:/rootfs:ro           # (기존 /:/host/root 에서 변경)
      - /sys:/sys:ro           # (기존 /sys:/host/sys 에서 변경 - cAdvisor 필수)
      - /var/lib/docker:/var/lib/docker:ro  # ◀◀ [새로 추가] 컨테이너 메트릭 필수 폴더
    command: 
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy 
    depends_on: # ◀ [수정됨] 딕셔너리 형태로 완벽히 통일
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - app-network

  # ====================================================
  # [3] 백엔드 앱 & DB 툴
  # ====================================================
  app:
    image: ${DOCKERHUB_USERNAME}/agent-harness-backend:latest
    container_name: springboot-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/agent_harness
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-password}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      alloy:
        condition: service_started
    networks:
      - app-network

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    volumes:
      - cloudbeaver-data:/opt/cloudbeaver/workspace
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  # ====================================================
  # [4] 시각화 (Grafana)
  # ====================================================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on: # ◀ [수정됨] 딕셔너리 형태로 완벽히 통일
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - app-network

  # ====================================================
  # [5] 라우팅 / 프록시 / 터널
  # ====================================================

  caddy:
    image: caddy:latest
    container_name: caddy
    ports:
      - "80:80"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile
      # 👇 infra 폴더 기준 상위 폴더의 frontend를 컨테이너 내부로 마운트
      - ../frontend:/var/www/frontend 
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - app
      - grafana
      - portainer
      - cloudbeaver
    networks:
      - app-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    depends_on:
      - caddy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
  grafana-data:
  prometheus-data:
  cloudbeaver-data:
  portainer-data:
  caddy_data:
  caddy_config:
