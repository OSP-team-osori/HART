spring:
  application:
    name: AgentHarness
  datasource:
    url: jdbc:postgresql://localhost:5433/agent_harness
    username: postgres
    password: password # 로컬 테스트용 비밀번호, 환경에 맞게 수정 필요
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8090
