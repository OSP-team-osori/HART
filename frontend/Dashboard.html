<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HART TADD - Dashboard</title>
    <!-- Pretendard GOV Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-gov.min.css" />
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Tailwind Config -->
    <script src="tailwind-config.js"></script>
    <!-- Custom CSS -->
    <link href="styles.css" rel="stylesheet">
</head>

<body class="min-h-screen flex font-sans overflow-hidden">

    <!-- Left Sidebar: Multi-Agent Fleet -->
    <aside id="sidebar-container" class="flex flex-col w-[400px] sidebar-glass shrink-0 relative z-20 shadow-xl border-r border-white/5 transition-none"></aside>

    <!-- Main Content -->
    <main class="flex-1 p-10 overflow-y-auto relative z-10">
        <!-- Header -->
        <div class="flex items-center gap-6 mb-10">
            <h1 class="text-4xl font-bold tracking-wide">OVERVIEW</h1>
        </div>

        <!-- Cards Container -->
        <div class="flex gap-6">

            <!-- Card 1 -->
            <div onclick="location.href='AgentView.html?id=1&name=Agent 1 (Aider)&status=Active'" class="glass-panel rounded-xl p-8 flex-1 flex flex-col min-h-[260px] group border border-primary/20 hover:border-primary/50 transition-colors cursor-pointer">
                <!-- Top Row -->
                <div class="flex justify-between items-center mb-6">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-lg bg-primaryDim flex items-center justify-center text-primary">
                            <i class="fa-solid fa-robot text-[24px]"></i>
                        </div>
                        <h2 class="font-bold text-[32px] text-white">Agent 1</h2>
                    </div>
                    <div class="flex items-center gap-2 text-[14px] text-primary bg-primaryDim border border-primary/20 px-3 py-1 rounded-full">
                        <div class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse shadow-[0_0_8px_#00FF88]"></div>
                        Active
                    </div>
                </div>
                
                <!-- Info & Button Row -->
                <div class="mt-auto flex justify-between items-end">
                    <div class="flex flex-col gap-4">
                        <div class="flex flex-col">
                            <span class="text-gray-400 text-[16px] uppercase tracking-wider font-semibold mb-1">TOTAL COST</span>
                            <span id="global-total-cost" class="text-white text-[34px] font-bold">$12.45</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-gray-400 text-[16px] uppercase tracking-wider font-semibold mb-1">TOKENS USED</span>
                            <span id="global-total-tokens" class="text-white text-[34px] font-bold">124,500</span>
                        </div>
                    </div>
                    <button class="w-14 h-14 rounded-full bg-white/5 hover:bg-primary text-gray-300 hover:text-dark flex items-center justify-center transition-all">
                        <i class="fa-solid fa-arrow-right text-[24px]"></i>
                    </button>
                </div>
            </div>

            <!-- Card 2 -->
            <div onclick="location.href='AgentView-dummy.html?id=2&name=Agent 2 (Claude)&status=Idle'" class="glass-panel rounded-xl p-8 flex-1 flex flex-col min-h-[260px] group border border-white/10 hover:border-white/20 transition-colors cursor-pointer">
                <!-- Top Row -->
                <div class="flex justify-between items-center mb-6">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-lg bg-white/5 flex items-center justify-center text-gray-400">
                            <i class="fa-solid fa-robot text-[24px]"></i>
                        </div>
                        <h2 class="font-bold text-[32px] text-gray-300">Agent 2</h2>
                    </div>
                    <div class="border border-white/10 bg-white/5 rounded-full px-3 py-1 text-[14px] text-gray-400">
                        Idle
                    </div>
                </div>
                
                <!-- Info & Button Row -->
                <div class="mt-auto flex justify-between items-end">
                    <div class="flex flex-col gap-4 opacity-60">
                        <div class="flex flex-col">
                            <span class="text-gray-500 text-[16px] uppercase tracking-wider font-semibold mb-1">TOTAL COST</span>
                            <span class="text-gray-300 text-[34px] font-bold">$0.00</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-gray-500 text-[16px] uppercase tracking-wider font-semibold mb-1">TOKENS USED</span>
                            <span class="text-gray-300 text-[34px] font-bold">0</span>
                        </div>
                    </div>
                    <button onclick="event.stopPropagation(); location.href='AgentView-dummy.html?id=2&name=Agent 2 (Claude)&status=Idle'" class="w-14 h-14 rounded-full bg-white/5 hover:bg-primary text-gray-400 hover:text-dark flex items-center justify-center transition-all cursor-pointer">
                        <i class="fa-solid fa-arrow-right text-[24px]"></i>
                    </button>
                </div>
            </div>

            <!-- Card 3 -->
            <div onclick="location.href='AgentView-dummy.html?id=3&name=Agent 3 (Devin)&status=Idle'" class="glass-panel rounded-xl p-8 flex-1 flex flex-col min-h-[260px] group border border-white/10 hover:border-white/20 transition-colors cursor-pointer">
                <!-- Top Row -->
                <div class="flex justify-between items-center mb-6">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-lg bg-white/5 flex items-center justify-center text-gray-400">
                            <i class="fa-solid fa-robot text-[24px]"></i>
                        </div>
                        <h2 class="font-bold text-[32px] text-gray-300">Agent 3</h2>
                    </div>
                    <div class="border border-white/10 bg-white/5 rounded-full px-3 py-1 text-[14px] text-gray-400">
                        Idle
                    </div>
                </div>
                
                <!-- Info & Button Row -->
                <div class="mt-auto flex justify-between items-end">
                    <div class="flex flex-col gap-4 opacity-60">
                        <div class="flex flex-col">
                            <span class="text-gray-500 text-[16px] uppercase tracking-wider font-semibold mb-1">TOTAL COST</span>
                            <span class="text-gray-300 text-[34px] font-bold">$0.00</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-gray-500 text-[16px] uppercase tracking-wider font-semibold mb-1">TOKENS USED</span>
                            <span class="text-gray-300 text-[34px] font-bold">0</span>
                        </div>
                    </div>
                    <button onclick="event.stopPropagation(); location.href='AgentView-dummy.html?id=3&name=Agent 3 (Devin)&status=Idle'" class="w-14 h-14 rounded-full bg-white/5 hover:bg-primary text-gray-400 hover:text-dark flex items-center justify-center transition-all cursor-pointer">
                        <i class="fa-solid fa-arrow-right text-[24px]"></i>
                    </button>
                </div>
            </div>

        </div>
    </main>

    <script src="sidebar.js"></script>
    
    <!-- Dashboard Stats Logic -->
    <script src="dashboard.js"></script>
</body>

</html>
