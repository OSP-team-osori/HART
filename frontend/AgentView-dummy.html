<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HART TADD - AI Agent Control Platform</title>
    <!-- Pretendard GOV Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-gov.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Tailwind Config -->
    <script src="tailwind-config.js"></script>
    <!-- Custom CSS -->
    <link href="styles.css" rel="stylesheet">
</head>

<body class="min-h-screen flex font-sans overflow-hidden">

    <!-- Left Sidebar: Multi-Agent Fleet -->
    <aside id="sidebar-container" class="flex flex-col w-[400px] sidebar-glass shrink-0 relative z-20 shadow-xl border-r border-white/5 transition-none"></aside>

    <!-- Main Content -->
    <main class="flex-1 p-12 flex flex-col relative z-10 overflow-y-auto">
        <!-- Header -->
        <div class="flex items-center gap-6 mb-12 mt-4">
            <h1 id="agent-name-title" class="text-[40px] font-medium text-white tracking-wide">Agent Name</h1>
            <div id="agent-status-badge" class="border border-gray-400 text-gray-200 rounded-full px-5 py-1.5 text-[18px]">
                상태 뱃지
            </div>
        </div>

        <div class="glass-panel rounded-xl p-8 text-white border border-white/10 hover:border-primary/50 transition-colors shadow-lg flex-[3_1_0%] mb-6">
            <h2 class="text-[24px] font-bold tracking-wide mb-4">신뢰도 점수</h2>
            <!-- 시각화 영역 (차트 등 삽입 예정) -->
        </div>

        <!-- 3개 Metrics (하단 1행) -->
        <div class="grid grid-cols-3 gap-6 flex-[2_1_0%]">
            <div class="glass-panel rounded-xl p-8 text-white text-[24px] font-bold tracking-wide border border-white/10 hover:border-primary/50 transition-colors shadow-lg">
                TEST RESULT
            </div>
            <div class="glass-panel rounded-xl p-8 text-white text-[24px] font-bold tracking-wide border border-white/10 hover:border-primary/50 transition-colors shadow-lg">
                TOKEN COST
            </div>
            <div class="glass-panel rounded-xl p-8 text-white text-[24px] font-bold tracking-wide border border-white/10 hover:border-primary/50 transition-colors shadow-lg">
                EXECUTION TIME
            </div>
        </div>
    </main>
    <script src="sidebar.js"></script>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const name = params.get('name');
            const status = params.get('status');
            
            if (name) {
                const titleEl = document.getElementById('agent-name-title');
                if (titleEl) titleEl.textContent = name;
            }
            if (status) {
                const badgeEl = document.getElementById('agent-status-badge');
                if (badgeEl) badgeEl.textContent = status;
            }
        })();
    </script>
</body>

</html>
