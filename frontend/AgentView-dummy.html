<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HART Agent View 2 Wireframe</title>
    <!-- Pretendard GOV Font -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-gov.min.css" />
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tailwind Config -->
    <script src="tailwind-config.js"></script>

    <!-- Custom CSS -->
    <link href="styles.css" rel="stylesheet">
</head>

<body class="min-h-screen flex font-sans overflow-hidden">

    <!-- Left Sidebar: Multi-Agent Fleet -->
    <aside class="flex flex-col w-[400px] sidebar-glass shrink-0 relative z-20 shadow-xl border-r border-white/5">
        <!-- Logo Area -->
        <div class="h-20 flex items-center px-6 border-b border-white/5">
            <div onclick="location.href='Dashboard.html'" class="flex items-center gap-3 cursor-pointer hover:opacity-80 transition-opacity">
                <div
                    class="w-10 h-10 rounded-lg bg-gradient-to-br from-primary to-secondary flex items-center justify-center shadow-lg shadow-primary/20">
                    <i class="fa-solid fa-microchip text-white text-[22px]"></i>
                </div>
                <div>
                    <h1 class="text-[24px] font-bold tracking-wide text-white">HART<span
                            class="text-primary">_</span>TADD
                    </h1>
                    <p class="text-[13px] text-gray-400 uppercase tracking-widest mt-0.5">Control Platform</p>
                </div>
            </div>
        </div>

        <!-- Fleet Navigation -->
        <nav class="flex-1 overflow-y-auto py-6 px-4">
            <div class="flex justify-between items-center px-2 mb-4">
                <h3 class="text-[16px] font-semibold text-gray-500 uppercase tracking-wider">Agent Fleet</h3>
                <span
                    class="text-[14px] bg-primary/20 text-primary px-2 py-0.5 rounded-full border border-primary/20">1/3
                    Active</span>
            </div>

            <ul class="space-y-4">
                <!-- Active Agent -->
                <li>
                    <button onclick="location.href='AgentView.html'"
                        class="w-full flex flex-col justify-between text-left px-6 py-5 h-32 rounded-xl bg-primary/10 border border-primary/30 shadow-[0_0_15px_rgba(79,70,229,0.1)] group relative overflow-hidden transition-all cursor-pointer">
                        <div class="absolute top-0 right-0 w-16 h-16 bg-primary/10 rounded-bl-full -mr-4 -mt-4"></div>
                        <div class="flex items-center justify-between w-full mb-1">
                            <div class="flex items-center gap-2 relative z-10">
                                <div
                                    class="w-2.5 h-2.5 bg-secondary rounded-full animate-pulse shadow-[0_0_8px_#10B981]">
                                </div>
                                <span class="font-bold text-white text-[20px]">Agent 1 (Aider)</span>
                            </div>
                            <i class="fa-solid fa-chevron-right text-[18px] text-primary opacity-70"></i>
                        </div>
                        <span class="text-[16px] text-gray-400 font-mono mt-1 block">PID: 14092 • Gem-1.5-Pro</span>
                    </button>
                </li>

                <!-- Dummy Agent -->
                <li>
                    <button onclick="location.href='AgentView-dummy.html'"
                        class="w-full flex flex-col justify-between text-left px-6 py-5 h-32 rounded-xl hover:bg-white/5 border border-transparent hover:border-white/5 transition-all opacity-60 cursor-pointer group">
                        <div class="flex items-center justify-between w-full mb-1">
                            <div class="flex items-center gap-2">
                                <div class="w-2 h-2 bg-gray-600 rounded-full"></div>
                                <span class="font-semibold text-gray-300 text-[20px]">Agent 2 (Claude)</span>
                            </div>
                            <span
                                class="text-[14px] px-2 py-1 rounded bg-gray-800 border border-gray-700 text-gray-400">Soon</span>
                        </div>
                        <span class="text-[16px] text-gray-500 font-mono mt-1 block">Specialized in Code Review</span>
                    </button>
                </li>

                <!-- Dummy Agent -->
                <li>
                    <button onclick="location.href='AgentView-dummy.html'"
                        class="w-full flex flex-col justify-between text-left px-6 py-5 h-32 rounded-xl hover:bg-white/5 border border-transparent hover:border-white/5 transition-all opacity-60 cursor-pointer group">
                        <div class="flex items-center justify-between w-full mb-1">
                            <div class="flex items-center gap-2">
                                <div class="w-2 h-2 bg-gray-600 rounded-full"></div>
                                <span class="font-semibold text-gray-300 text-[20px]">Agent 3 (Devin)</span>
                            </div>
                            <span
                                class="text-[14px] px-2 py-1 rounded bg-gray-800 border border-gray-700 text-gray-400">Soon</span>
                        </div>
                        <span class="text-[16px] text-gray-500 font-mono mt-1 block">Autonomous Engineer</span>
                    </button>
                </li>
            </ul>
        </nav>

        <!-- Bottom Settings -->
        <div class="p-4 border-t border-white/5">
            <button
                class="w-full flex items-center justify-center gap-2 py-3.5 rounded-lg bg-darker/50 hover:bg-white/10 text-gray-400 hover:text-white transition-colors border border-white/5 text-[18px] font-semibold">
                <i class="fa-solid fa-plus"></i> Add New Agent
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-12 flex flex-col relative z-10 overflow-y-auto">
        <!-- Header -->
        <div class="flex items-center gap-6 mb-12 mt-4">
            <h1 class="text-[40px] font-medium text-white tracking-wide">Agent Name</h1>
            <div class="border border-gray-400 text-gray-200 rounded-full px-5 py-1.5 text-[18px]">
                상태 뱃지
            </div>
        </div>

        <div class="glass-panel rounded-xl p-8 text-white border border-white/10 hover:border-primary/50 transition-colors shadow-lg flex-[3_1_0%] mb-6">
            <h2 class="text-[24px] font-bold tracking-wide mb-4">신뢰도 점수</h2>
            <!-- 시각화 영역 (차트 등 삽입 예정) -->
        </div>

        <!-- 3개 Metrics (하단 1행) -->
        <div class="grid grid-cols-3 gap-6 flex-[2_1_0%]">
            <div class="glass-panel rounded-xl p-8 text-white text-[24px] font-bold tracking-wide border border-white/10 hover:border-primary/50 transition-colors shadow-lg">
                TEST RESULT
            </div>
            <div class="glass-panel rounded-xl p-8 text-white text-[24px] font-bold tracking-wide border border-white/10 hover:border-primary/50 transition-colors shadow-lg">
                TOKEN COST
            </div>
            <div class="glass-panel rounded-xl p-8 text-white text-[24px] font-bold tracking-wide border border-white/10 hover:border-primary/50 transition-colors shadow-lg">
                EXECUTION TIME
            </div>
        </div>
    </main>

</body>

</html>
