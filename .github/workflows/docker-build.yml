name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ] # 필요시 실제 배포용 브랜치명(예: master 등)으로 변경하세요.

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. 전체 소스 코드 체크아웃 (루트 디렉토리 기준)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Docker Buildx 설정 (멀티 플랫폼 및 캐싱용)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Docker Hub 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ----------------------------------------------------
      # [1] Spring Boot Backend App 빌드
      # 기존 docker-compose에서 context: .. 이었으므로 
      # 루트(.)를 컨텍스트로 잡고 backend 내부의 Dockerfile을 타겟팅합니다.
      # ----------------------------------------------------
      - name: Build and push Backend App
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/agent-harness-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------------------------------
      # [2] Custom Caddy 빌드
      # 컨텍스트를 ./infra/caddy 폴더로 정확히 지정합니다.
      # ----------------------------------------------------
      - name: Build and push Custom Caddy
        uses: docker/build-push-action@v5
        with:
          context: ./infra/caddy
          file: ./infra/caddy/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/custom-caddy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------------------------------
      # [3] Custom Prometheus 빌드
      # ----------------------------------------------------
      - name: Build and push Custom Prometheus
        uses: docker/build-push-action@v5
        with:
          context: ./infra/prometheus
          file: ./infra/prometheus/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/custom-prometheus:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------------------------------
      # [4] Custom Promtail 빌드
      # ----------------------------------------------------
      - name: Build and push Custom Promtail
        uses: docker/build-push-action@v5
        with:
          context: ./infra/promtail
          file: ./infra/promtail/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/custom-promtail:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------------------------------
      # [5] Custom Grafana 빌드 (provisioning 폴더 포함)
      # ----------------------------------------------------
      - name: Build and push Custom Grafana
        uses: docker/build-push-action@v5
        with:
          context: ./infra/grafana
          file: ./infra/grafana/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/custom-grafana:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max