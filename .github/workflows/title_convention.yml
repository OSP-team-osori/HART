name: Title Convention Check

on:
  issues:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  pull_request: # PR에서도 작동하도록 추가
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  issues: write
  pull-requests: write # PR 댓글 권한 추가

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 제목 검사 및 경고 댓글 작성
        uses: actions/github-script@v7
        with:
          
          script: |
            // 💡 핵심: PR인지 이슈인지 판별해서 안전하게 제목을 가져옵니다.
            const title = context.payload.pull_request?.title || context.payload.issue?.title;
            const type = context.payload.pull_request ? 'PR' : '이슈';
            
            const regex = /^(feat|docs|fix|bug|chore|question)\s*:\s*.+$/;
            
            if (!regex.test(title)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number, // PR 번호와 이슈 번호는 이걸로 공통 처리됨
                body:[
                  `❌ **${type} 제목 형식이 올바르지 않습니다.**`,
                  '',
                  `현재 제목: \`${title}\``,
                  '',
                  `아래 컨벤션에 맞게 ${type} 제목을 수정해 주세요.`,
                  '- `feat: 기능 추가`',
                  '- `fix: 버그 수정`',
                  '- `docs: 문서 수정`',
                  '- `chore: 설정 변경`'
                ].join('\n')
              });
              
              core.setFailed(`❌ ${type} 제목 규칙 위반: 경고 댓글 작성됨`);
            } else {
              console.log(`✅ 올바른 ${type} 제목 형식입니다.`);
            }
